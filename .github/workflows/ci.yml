name: Members Service CI

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:
    branches:
      - main

jobs:
  members-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: members-service/package-lock.json

      - name: Install dependencies
        working-directory: members-service
        run: npm ci

      - name: Run tests
        working-directory: members-service
        run: npm test
