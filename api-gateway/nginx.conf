events {}

http {
  upstream members_upstream {
    server members-service:3001;
  }

  upstream bookings_upstream {
    server bookings-service:8080;
  }

  server {
    listen 8080;

    location = /health {
      add_header Content-Type text/plain;
      return 200 'ok';
    }

    # Keep canonical trailing-slash prefixes for gateway groups.
    location = /members {
      return 308 /members/;
    }

    location /members/ {
      proxy_pass http://members_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /members/docs {
      return 302 /members/docs/;
    }

    location /members/docs/ {
      proxy_pass http://members_upstream/docs/;
      proxy_set_header Host $host;
      proxy_redirect /docs/ /members/docs/;
    }

    location = /members/health {
      proxy_pass http://members_upstream/health;
      proxy_set_header Host $host;
    }

    location /bookings/ {
      proxy_pass http://bookings_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Prevent nginx auto-redirect from /bookings -> /bookings/
    # because swagger "Try it out" uses /bookings exactly.
    location = /bookings {
      proxy_pass http://bookings_upstream/bookings;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /bookings/swagger-ui/ {
      proxy_pass http://bookings_upstream/swagger-ui/;
      proxy_set_header Host $host;
    }

    # Convenience alias for manual testing.
    location = /bookings/docs {
      return 302 /bookings/swagger-ui/index.html;
    }

    location /bookings/v3/api-docs {
      proxy_pass http://bookings_upstream/v3/api-docs;
      proxy_set_header Host $host;
    }

    location /bookings/v3/api-docs/ {
      proxy_pass http://bookings_upstream/v3/api-docs/;
      proxy_set_header Host $host;
    }

    # Swagger UI may request the config URL from /v3/api-docs/swagger-config.
    location = /v3/api-docs {
      proxy_pass http://bookings_upstream/v3/api-docs;
      proxy_set_header Host $host;
    }

    location /v3/api-docs/ {
      proxy_pass http://bookings_upstream/v3/api-docs/;
      proxy_set_header Host $host;
    }

    location = /v3/api-docs/swagger-config {
      proxy_pass http://bookings_upstream/v3/api-docs/swagger-config;
      proxy_set_header Host $host;
    }
  }
}
